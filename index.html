<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramzon Tools – Amazon Style</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <span>Loading Ramzon Tools…</span>
  </div>

  <!-- Header -->
  <header>
    <div class="logo">Ramzon Tools</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search tools...">
    </div>
    <div class="cart-icon" id="cartIcon">
      🛒 <span id="cartCount">0</span>
    </div>
    <button id="themeToggle">Toggle Dark Mode</button>
  </header>

  <!-- Tools Grid -->
  <main id="toolsGrid"></main>

  <!-- Modal Details -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modalTitle"></h2>
      <p id="modalDescription"></p>
      <p id="modalPrice"></p>
      <button id="modalAddToCart">Add to Cart</button>
    </div>
  </div>

  <!-- Cart Sidebar -->
  <div id="cartSidebar" class="cart-sidebar">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <p>Total: $<span id="cartTotal">0</span></p>
    <button id="checkoutBtn">Checkout</button>
    <span class="close-cart">&times;</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
