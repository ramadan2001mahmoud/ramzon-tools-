<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمزون - تسوق اونلاين</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <i class="fas fa-store"></i>
                    <h1 id="siteTitle">رمزون</h1>
                </div>
                
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="ابحث في رمزون...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>

                <div class="header-icons">
                    <div class="language-selector">
                        <select id="languageSelect">
                            <option value="ar">العربية</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                    <i class="fas fa-user" id="userIcon" title="حسابي"></i>
                    <div class="cart-icon" id="cartIcon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </div>
                </div>
            </div>

            <nav class="categories" id="categoriesNav">
                <!-- Categories will be populated by JS -->
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2 id="heroTitle">اكتشف العروض المذهلة في رمزون</h2>
            <p id="heroSubtitle">إلكترونيات، أزياء، أدوات منزلية وأكثر. توصيل سريع!</p>
            <button class="cta-btn" id="shopNowBtn">تسوق الآن</button>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label id="sortLabel">ترتيب حسب:</label>
                    <select id="sortSelect">
                        <option value="name">الاسم</option>
                        <option value="price-low">السعر: من الأقل للأعلى</option>
                        <option value="price-high">السعر: من الأعلى للأقل</option>
                        <option value="rating">التقييم</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label id="priceLabel">السعر:</label>
                    <input type="range" id="priceRange" min="0" max="100000" value="100000">
                    <span id="priceValue">100,000 ر.س</span>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="products-grid" id="productsGrid">
                <!-- Products loaded by JS -->
            </div>
        </div>
    </main>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="cartTitle">سلة التسوق</h3>
                <span class="close" id="closeCart">&times;</span>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total">
                <span id="totalLabel">الإجمالي: <strong id="cartTotal">0 ر.س</strong></span>
                <button class="checkout-btn" id="checkoutBtn">إتمام الشراء</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
