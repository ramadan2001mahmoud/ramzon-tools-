<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramzon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">Ramzon</div>

  <input type="text" id="search" placeholder="ابحث عن منتج...">

  <div class="header-icons">
    <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
  </div>
</header>

<!-- Navbar -->
<nav class="nav">
  <ul>
    <li data-cat="all">الكل</li>
    <li data-cat="electronics">إلكترونيات</li>
    <li data-cat="tools">أدوات</li>
    <li data-cat="perfume">عطور</li>
  </ul>
</nav>

<!-- Banner -->
<section class="banner">
  <div class="banner-content">
    <h1>خصومات قوية</h1>
    <p>أفضل المنتجات بأسعار رهيبة</p>
    <button>تسوق الآن</button>
  </div>
</section>

<!-- Products -->
<section class="products">
  <h2>أفضل المنتجات</h2>
  <div id="products-container"></div>
</section>

<!-- Cart -->
<div id="cart" class="cart">
  <h3>سلة الشراء</h3>
  <div id="cart-items"></div>
  <p>الإجمالي: $<span id="total">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
