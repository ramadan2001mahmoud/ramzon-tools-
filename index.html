<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramzon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Header -->
<div class="top-header">
  <div class="logo">تجملات</div>
  <input type="text" placeholder="ابحث هنا...">
</div>

<!-- Navbar -->
<nav class="navbar">
  <ul>
    <li>الصفحة الرئيسية</li>
    <li>الأزياء</li>
    <li>الأثاث</li>
    <li>الأجهزة المنزلية</li>
    <li>الجمال والعطور</li>
    <li>الرياضة والترفيه</li>
  </ul>
</nav>

<!-- Banner -->
<section class="banner">
  <div class="banner-text">
    <h1>خصومات قوية</h1>
    <p>عروض لا تقاوم على أفضل المنتجات!</p>
    <button>تسوق الآن</button>
  </div>
</section>

<!-- Categories -->
<section class="categories">
  <div class="cat">
    <img src="https://images.pexels.com/photos/1334597/pexels-photo-1334597.jpeg">
    <h3>أحدث الإلكترونيات</h3>
    <button>تسوق الآن</button>
  </div>

  <div class="cat">
    <img src="https://images.pexels.com/photos/965989/pexels-photo-965989.jpeg">
    <h3>عطور ومستحضرات</h3>
    <button>تسوق الآن</button>
  </div>

  <div class="cat">
    <img src="https://images.pexels.com/photos/2529148/pexels-photo-2529148.jpeg">
    <h3>أحذية رياضية</h3>
    <button>تسوق الآن</button>
  </div>

  <div class="cat">
    <img src="https://images.pexels.com/photos/4246120/pexels-photo-4246120.jpeg">
    <h3>توصيل سريع</h3>
    <button>تسوق الآن</button>
  </div>
</section>

<!-- Products -->
<section class="products">
  <h2>تسوق المزيد</h2>

  <div class="grid">

    <div class="product">
      <img src="https://images.pexels.com/photos/5081395/pexels-photo-5081395.jpeg">
    </div>

    <div class="product">
      <img src="https://images.pexels.com/photos/18105/pexels-photo.jpg">
    </div>

    <div class="product">
      <img src="https://images.pexels.com/photos/3394650/pexels-photo-3394650.jpeg">
    </div>

    <div class="product">
      <img src="https://images.pexels.com/photos/373946/pexels-photo-373946.jpeg">
    </div>

  </div>
</section>

</body>
</html>
