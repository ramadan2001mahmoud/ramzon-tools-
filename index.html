<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramzon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">Ramzon</div>

  <div class="search">
    <input id="searchInput" placeholder="ابحث عن منتج...">
    <button id="searchBtn">🔍</button>
  </div>

  <div class="actions">
    <span id="cartBtn">🛒 (<span id="cartCount">0</span>)</span>
  </div>
</header>

<!-- NAVBAR -->
<nav class="nav">
  <ul>
    <li data-cat="all">الكل</li>
    <li data-cat="electronics">إلكترونيات</li>
    <li data-cat="tools">أدوات</li>
    <li data-cat="perfume">عطور</li>
  </ul>
</nav>

<!-- PRODUCTS -->
<section class="products">
  <div id="products"></div>
</section>

<!-- CART -->
<div id="cart" class="cart"></div>

<script src="script.js"></script>
</body>
</html>
