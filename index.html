<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramzon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">Ramzon</div>

  <div class="search-box">
    <input type="text" id="search" placeholder="ابحث عن منتج...">
    <button id="searchBtn">🔍</button>
  </div>

  <div class="header-icons">
    <div id="wishlist-btn">❤️ <span id="wish-count">0</span></div>
    <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
  </div>
</header>

<nav class="nav">
  <ul>
    <li class="menu">إلكترونيات
      <div class="dropdown">
        <a href="#">كاميرات</a>
        <a href="#">سماعات</a>
      </div>
    </li>

    <li class="menu">أدوات
      <div class="dropdown">
        <a href="#">مطارق</a>
        <a href="#">معدات</a>
      </div>
    </li>

    <li class="menu">عطور</li>
  </ul>
</nav>

<section class="products">
  <div id="products-container"></div>
</section>

<div id="cart" class="cart">
  <h3>سلة الشراء</h3>
  <div id="cart-items"></div>
  <p>الإجمالي: $<span id="total">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
