<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramzon - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Hero Section -->
  <section class="bg-blue-600 text-white p-10 text-center">
    <h1 class="text-4xl font-bold mb-2">Welcome to Ramzon</h1>
    <p class="text-lg">Your one-stop shop for electronics, perfumes, and clothes!</p>
    <button class="mt-4 px-6 py-3 bg-yellow-400 font-bold rounded">Shop Now</button>
  </section>

  <!-- Product Listing -->
  <section class="p-10">
    <h2 class="text-2xl font-bold mb-6">Featured Products</h2>
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Product cards will be injected here by JS -->
    </div>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="js/main.js"></script>
</body>
</html>
