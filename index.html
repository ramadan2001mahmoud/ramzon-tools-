<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramzon Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Ramzon</div>
        <ul class="nav-menu">
            <li><a href="#">الرئيسية</a></li>
            <li><a href="#">الأدوات</a></li>
            <li><a href="#">عروض</a></li>
            <li><a href="#">اتصل بنا</a></li>
        </ul>
        <div id="themeToggle" class="theme-toggle">🌙</div>
        <div id="navToggle" class="nav-toggle">☰</div>
    </nav>

    <!-- شريط الأدوات الأفقي -->
    <div class="tools-bar">
        <div class="tool-item">
            <img src="images/hammer.png" alt="مطرقة">
            <span>مطرقة</span>
        </div>
        <div class="tool-item">
            <img src="images/screwdriver.png" alt="مفك">
            <span>مفك</span>
        </div>
        <div class="tool-item">
            <img src="images/wrench.png" alt="مفتاح">
            <span>مفتاح</span>
        </div>
        <div class="tool-item">
            <img src="images/drill.png" alt="مثقاب">
            <span>مثقاب</span>
        </div>
        <div class="tool-item">
            <img src="images/saw.png" alt="منشار">
            <span>منشار</span>
        </div>
    </div>

    <section class="products-section">
        <div class="products-grid">
            <div class="product-card">
                <img src="images/hammer.png" alt="مطرقة">
                <h3>مطرقة قوية</h3>
                <p>سعر: 120 جنيه</p>
                <button>اشترِ الآن</button>
            </div>
            <div class="product-card">
                <img src="images/screwdriver.png" alt="مفك">
                <h3>مجموعة مفكات</h3>
                <p>سعر: 80 جنيه</p>
                <button>اشترِ الآن</button>
            </div>
            <div class="product-card">
                <img src="images/wrench.png" alt="مفتاح">
                <h3>مفتاح ربط</h3>
                <p>سعر: 90 جنيه</p>
                <button>اشترِ الآن</button>
            </div>
            <div class="product-card">
                <img src="images/drill.png" alt="مثقاب">
                <h3>مثقاب كهربائي</h3>
                <p>سعر: 250 جنيه</p>
                <button>اشترِ الآن</button>
            </div>
            <div class="product-card">
                <img src="images/saw.png" alt="منشار">
                <h3>منشار يدوي</h3>
                <p>سعر: 150 جنيه</p>
                <button>اشترِ الآن</button>
            </div>
        </div>
    </section>

<script src="script.js"></script>
</body>
</html>
